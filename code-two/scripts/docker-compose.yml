version: '3.2'
services:
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
    - 9090:9090
    command:
    - --config.file=/etc/prometheus/prometheus.yml
    volumes:
    - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
    - cadvisor
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    ports:
    - 8080:8080
    volumes:
    - /:/rootfs:ro
    - /var/run:/var/run:rw
    - /sys:/sys:ro
    - /var/lib/docker/:/var/lib/docker:ro
    depends_on:
    - redis
  redis:
    image: redis:latest
    container_name: redis
    ports:
    - 6379:6379
  noisy:
    image: noisy:latest
    container_name: noise
    ports:
    - 8081:8081
    command:
    - --config=config.json
  matric:
    image: demo-flow:latest
    container_name: demo-flow
  controller:
    image: debian-bazel:latest
    container_name: controller
    volumes:
    - /var/run/docker.sock:/var/run/docker.sock docker
    