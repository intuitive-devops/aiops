apiVersion: apps/v1
kind: Deployment
metadata:
  name: aipos-level-1
  namespace: aiops
  labels:
    app: aiops-L1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aiops-L1
  template:
    metadata:
      labels:
        app: aiops-L1
    spec:
      tolerations:
        - key: kubernetes.azure.com/scalesetpriority
          operator: Equal
          value: spot
          effect: NoSchedule
      containers:
        - name: network-noise
          image: busybox:1.36
          ports:
            - containerPort: 8080
          command:
             - sh
             - -c
             - while true; do dd if=/dev/zero of=/dev/null bs=1M count=2; sleep 5; done
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          envFrom:
            - configMapRef:
                name: aiops-noise-configmap
