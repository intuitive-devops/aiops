grafana:
  adminPassword: bunnyhop
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      labelValue: "1"
      searchNamespace: ALL

prometheus:
  prometheusSpec:
    additionalScrapeConfigs:
      - job_name: bunnyhop-demo-api
        metrics_path: /metrics
        scrape_interval: 10s
        static_configs:
          - targets:
              - 192.168.49.2:8787
